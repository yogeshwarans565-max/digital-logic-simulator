<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Logic Simulator — Live Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f0c;
    --bezel: #121a15;
    --screen: #0e1712;
    --grid-line: rgba(94,255,143,0.07);
    --phosphor: #5eff8f;
    --phosphor-dim: #2b4a37;
    --phosphor-mid: #3f7a56;
    --amber: #ffb020;
    --amber-dim: #4a3a12;
    --text-primary: #d8f5df;
    --text-muted: #6f8f7c;
    --border: #223229;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 32px 16px 64px;
  }

  .device {
    max-width: 880px;
    margin: 0 auto;
    background: var(--bezel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 24px 32px;
  }

  .nameplate {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .nameplate h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 26px;
    margin: 0;
    letter-spacing: 0.5px;
  }

  .nameplate .model {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .power-led {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--phosphor);
    box-shadow: 0 0 6px var(--phosphor);
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .tab-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: var(--screen);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    cursor: pointer;
  }

  .tab-btn.active {
    color: var(--phosphor);
    border-color: var(--phosphor-mid);
  }

  .screen {
    background: var(--screen);
    border: 1px solid var(--border);
    border-radius: 10px;
    background-image:
      repeating-linear-gradient(0deg, var(--grid-line) 0px, var(--grid-line) 1px, transparent 1px, transparent 24px),
      repeating-linear-gradient(90deg, var(--grid-line) 0px, var(--grid-line) 1px, transparent 1px, transparent 24px);
    padding: 20px;
    min-height: 260px;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .switch-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .switch-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .toggle {
    width: 52px;
    height: 30px;
    border-radius: 15px;
    background: var(--phosphor-dim);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background 0.15s ease;
    flex-shrink: 0;
  }

  .toggle.on { background: var(--phosphor-mid); }

  .toggle .knob {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: left 0.15s ease, background 0.15s ease;
  }

  .toggle.on .knob {
    left: 27px;
    background: var(--phosphor);
    box-shadow: 0 0 8px var(--phosphor);
  }

  .gate-select {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .gate-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
  }

  .gate-btn.active {
    color: var(--phosphor);
    border-color: var(--phosphor-mid);
    background: rgba(94,255,143,0.06);
  }

  .led {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--phosphor-dim);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-muted);
    transition: all 0.15s ease;
  }

  .led.on {
    background: var(--phosphor-mid);
    color: var(--phosphor);
    box-shadow: 0 0 14px rgba(94,255,143,0.5);
    border-color: var(--phosphor);
  }

  .led.amber-on {
    background: var(--amber-dim);
    color: var(--amber);
    box-shadow: 0 0 14px rgba(255,176,32,0.5);
    border-color: var(--amber);
  }

  .out-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  table.truth {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 8px;
  }

  table.truth th {
    text-align: left;
    color: var(--text-muted);
    font-weight: 400;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 1px;
  }

  table.truth td {
    padding: 6px 10px;
    border-bottom: 1px solid rgba(34,50,41,0.5);
    color: var(--text-muted);
  }

  table.truth tr.current td {
    color: var(--phosphor);
    background: rgba(94,255,143,0.06);
  }

  .bit-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }

  .bit-row .row-tag {
    width: 60px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .readout {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .readout .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .readout .stat .val {
    font-size: 22px;
    font-weight: 700;
    color: var(--phosphor);
  }

  .readout .stat .val.amber { color: var(--amber); }

  .readout .stat .lbl {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  button.pulse-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--phosphor-dim);
    color: var(--phosphor);
    border: 1px solid var(--phosphor-mid);
    border-radius: 6px;
    padding: 10px 18px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  button.pulse-btn:active { background: var(--phosphor-mid); }

  .scope {
    margin-top: 20px;
    background: var(--screen);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 14px;
  }

  .scope-title {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .trace-row {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 26px;
  }

  .trace-label {
    width: 34px;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  svg.trace { flex: 1; height: 24px; }

  footer {
    max-width: 880px;
    margin: 18px auto 0;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
  }

  footer a { color: var(--phosphor-mid); }

  @media (max-width: 520px) {
    .nameplate h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="device">
  <div class="nameplate">
    <div>
      <h1>Digital Logic Simulator</h1>
      <div class="model">MODEL DLS-1 &middot; event-driven Java logic sim, run live in-browser</div>
    </div>
    <div class="power-led"><span class="dot"></span> live</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="gates">Gates</button>
    <button class="tab-btn" data-tab="adder">4-bit adder</button>
    <button class="tab-btn" data-tab="flipflop">D flip-flop</button>
  </div>

  <div class="screen">

    <div class="panel active" id="panel-gates">
      <div class="gate-select" id="gate-select"></div>
      <div class="row" id="gate-inputs"></div>
      <div class="row">
        <div class="switch-group">
          <div class="led" id="gate-led">0</div>
          <div class="out-label">OUTPUT Y</div>
        </div>
      </div>
      <table class="truth" id="gate-truth"></table>
      <div class="scope">
        <div class="scope-title">Signal trace</div>
        <div class="trace-row"><span class="trace-label">A</span><svg class="trace" id="trace-a" viewBox="0 0 300 24" preserveAspectRatio="none"></svg></div>
        <div class="trace-row" id="trace-b-row"><span class="trace-label">B</span><svg class="trace" id="trace-b" viewBox="0 0 300 24" preserveAspectRatio="none"></svg></div>
        <div class="trace-row"><span class="trace-label">Y</span><svg class="trace" id="trace-y" viewBox="0 0 300 24" preserveAspectRatio="none"></svg></div>
      </div>
    </div>

    <div class="panel" id="panel-adder">
      <div class="bit-row" id="a-bits"><span class="row-tag">OPERAND A</span></div>
      <div class="bit-row" id="b-bits"><span class="row-tag">OPERAND B</span></div>
      <div class="readout">
        <div class="stat"><span class="val" id="adder-a-dec">0</span><span class="lbl">A (decimal)</span></div>
        <div class="stat"><span class="val" id="adder-b-dec">0</span><span class="lbl">B (decimal)</span></div>
        <div class="stat"><span class="val" id="adder-sum-dec">0</span><span class="lbl">Sum</span></div>
        <div class="stat"><span class="val amber" id="adder-carry">0</span><span class="lbl">Carry out</span></div>
      </div>
      <div class="row" style="margin-top:16px;">
        <span class="out-label" style="margin-right:8px;">SUM BITS</span>
        <div id="sum-bits" style="display:flex; gap:6px;"></div>
      </div>
    </div>

    <div class="panel" id="panel-flipflop">
      <div class="row">
        <div class="switch-group">
          <div class="toggle" id="ff-d-toggle"><div class="knob"></div></div>
          <div class="switch-label">D</div>
        </div>
        <button class="pulse-btn" id="ff-clock-btn">Pulse clock ↑</button>
        <div class="switch-group">
          <div class="led" id="ff-q-led">0</div>
          <div class="out-label">Q</div>
        </div>
      </div>
      <div class="scope">
        <div class="scope-title">Signal trace</div>
        <div class="trace-row"><span class="trace-label">CLK</span><svg class="trace" id="ff-trace-clk" viewBox="0 0 300 24" preserveAspectRatio="none"></svg></div>
        <div class="trace-row"><span class="trace-label">D</span><svg class="trace" id="ff-trace-d" viewBox="0 0 300 24" preserveAspectRatio="none"></svg></div>
        <div class="trace-row"><span class="trace-label">Q</span><svg class="trace" id="ff-trace-q" viewBox="0 0 300 24" preserveAspectRatio="none"></svg></div>
      </div>
    </div>

  </div>
</div>

<footer>
  Mirrors the logic in the Java simulator &middot;
  <a href="https://github.com/yogeshwarans565-max/digital-logic-simulator" target="_blank">view source on GitHub</a>
</footer>

<script>
// ---------- Gate logic (mirrors the Java Gate subclasses exactly) ----------
const GATES = {
  AND:  { inputs: 2, fn: (a,b) => a && b },
  OR:   { inputs: 2, fn: (a,b) => a || b },
  NOT:  { inputs: 1, fn: (a) => !a },
  NAND: { inputs: 2, fn: (a,b) => !(a && b) },
  NOR:  { inputs: 2, fn: (a,b) => !(a || b) },
  XOR:  { inputs: 2, fn: (a,b) => a !== b },
  XNOR: { inputs: 2, fn: (a,b) => a === b },
};

let currentGate = 'AND';
let gateA = false, gateB = false;
const gateHistory = { a: [], b: [], y: [] };

function computeGate() {
  const g = GATES[currentGate];
  return g.inputs === 1 ? g.fn(gateA) : g.fn(gateA, gateB);
}

function renderGateSelect() {
  const el = document.getElementById('gate-select');
  el.innerHTML = '';
  Object.keys(GATES).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'gate-btn' + (name === currentGate ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => { currentGate = name; resetGateHistory(); renderGate(); };
    el.appendChild(btn);
  });
}

function resetGateHistory() {
  gateHistory.a = []; gateHistory.b = []; gateHistory.y = [];
}

function renderGateInputs() {
  const el = document.getElementById('gate-inputs');
  el.innerHTML = '';
  const makeToggle = (label, getVal, setVal) => {
    const group = document.createElement('div');
    group.className = 'switch-group';
    const t = document.createElement('div');
    t.className = 'toggle' + (getVal() ? ' on' : '');
    t.innerHTML = '<div class="knob"></div>';
    t.onclick = () => { setVal(!getVal()); pushGateSample(); renderGate(); };
    const lbl = document.createElement('div');
    lbl.className = 'switch-label';
    lbl.textContent = label;
    group.appendChild(t);
    group.appendChild(lbl);
    el.appendChild(group);
  };
  makeToggle('A', () => gateA, (v) => gateA = v);
  if (GATES[currentGate].inputs === 2) {
    makeToggle('B', () => gateB, (v) => gateB = v);
  }
}

function pushGateSample() {
  const y = computeGate();
  gateHistory.a.push(gateA ? 1 : 0);
  gateHistory.b.push(gateB ? 1 : 0);
  gateHistory.y.push(y ? 1 : 0);
  [gateHistory.a, gateHistory.b, gateHistory.y].forEach(arr => {
    if (arr.length > 40) arr.shift();
  });
}

function renderGateTruth() {
  const g = GATES[currentGate];
  const el = document.getElementById('gate-truth');
  const rows = [];
  const n = g.inputs;
  for (let mask = 0; mask < (1 << n); mask++) {
    const a = !!((mask >> 0) & 1);
    const b = n === 2 ? !!((mask >> 1) & 1) : null;
    const y = n === 1 ? g.fn(a) : g.fn(a, b);
    const isCurrent = n === 1 ? (a === gateA) : (a === gateA && b === gateB);
    rows.push({ a, b, y, isCurrent });
  }
  let html = '<tr><th>A</th>' + (n === 2 ? '<th>B</th>' : '') + '<th>Y</th></tr>';
  rows.forEach(r => {
    html += `<tr class="${r.isCurrent ? 'current' : ''}"><td>${r.a ? 1 : 0}</td>` +
            (n === 2 ? `<td>${r.b ? 1 : 0}</td>` : '') +
            `<td>${r.y ? 1 : 0}</td></tr>`;
  });
  el.innerHTML = html;
}

function renderTrace(svgId, history, color) {
  const svg = document.getElementById(svgId);
  const w = 300, h = 24, step = 8;
  const points = [];
  const startX = w - history.length * step;
  history.forEach((v, i) => {
    const x = startX + i * step;
    const y = v ? 4 : h - 4;
    points.push(`${x},${y}`);
    if (i > 0) {
      const prevY = history[i-1] ? 4 : h - 4;
      if (prevY !== y) points.push(`${x},${prevY}`, `${x},${y}`);
    }
  });
  const path = points.length ? 'M ' + points.join(' L ') : '';
  svg.innerHTML = `<polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="miter"/>`;
}

function renderGate() {
  renderGateSelect();
  renderGateInputs();
  document.getElementById('trace-b-row').style.display = GATES[currentGate].inputs === 2 ? 'flex' : 'none';
  const y = computeGate();
  const led = document.getElementById('gate-led');
  led.textContent = y ? '1' : '0';
  led.className = 'led' + (y ? ' on' : '');
  renderGateTruth();
  renderTrace('trace-a', gateHistory.a, '#5eff8f');
  renderTrace('trace-b', gateHistory.b, '#5eff8f');
  renderTrace('trace-y', gateHistory.y, '#ffb020');
}

// ---------- 4-bit ripple carry adder (mirrors RippleCarryAdder.java) ----------
const WIDTH = 4;
let aBits = [0,0,0,0];
let bBits = [0,0,0,0];

function fullAdd(a, b, cin) {
  const sum = a ^ b ^ cin;
  const cout = (a & b) | (cin & (a ^ b));
  return { sum, cout };
}

function computeAdder() {
  let carry = 0;
  const sumBits = [];
  for (let i = 0; i < WIDTH; i++) {
    const r = fullAdd(aBits[i], bBits[i], carry);
    sumBits.push(r.sum);
    carry = r.cout;
  }
  return { sumBits, carryOut: carry };
}

function bitsToDec(bits) {
  return bits.reduce((acc, b, i) => acc + (b << i), 0);
}

function renderBitRow(containerId, bits, onToggle) {
  const container = document.getElementById(containerId);
  while (container.children.length > 1) container.removeChild(container.lastChild);
  for (let i = WIDTH - 1; i >= 0; i--) {
    const t = document.createElement('div');
    t.className = 'toggle' + (bits[i] ? ' on' : '');
    t.style.width = '38px';
    t.style.height = '24px';
    t.innerHTML = '<div class="knob" style="width:16px;height:16px;"></div>';
    t.onclick = () => { bits[i] = bits[i] ? 0 : 1; renderAdder(); };
    container.appendChild(t);
  }
}

function renderAdder() {
  renderBitRow('a-bits', aBits);
  renderBitRow('b-bits', bBits);
  const { sumBits, carryOut } = computeAdder();
  document.getElementById('adder-a-dec').textContent = bitsToDec(aBits);
  document.getElementById('adder-b-dec').textContent = bitsToDec(bBits);
  document.getElementById('adder-sum-dec').textContent = bitsToDec(sumBits);
  document.getElementById('adder-carry').textContent = carryOut;

  const sumEl = document.getElementById('sum-bits');
  sumEl.innerHTML = '';
  for (let i = WIDTH - 1; i >= 0; i--) {
    const led = document.createElement('div');
    led.className = 'led' + (sumBits[i] ? ' on' : '');
    led.style.width = '32px';
    led.style.height = '32px';
    led.style.fontSize = '12px';
    led.textContent = sumBits[i];
    sumEl.appendChild(led);
  }
}

// ---------- D flip-flop (mirrors DFlipFlop.java: rising-edge capture) ----------
let ffD = false, ffQ = false, ffClk = false;
const ffHistory = { clk: [], d: [], q: [] };

function ffPulse() {
  ffHistory.clk.push(0); ffHistory.d.push(ffD ? 1 : 0); ffHistory.q.push(ffQ ? 1 : 0);
  ffClk = true;
  ffQ = ffD;
  ffHistory.clk.push(1); ffHistory.d.push(ffD ? 1 : 0); ffHistory.q.push(ffQ ? 1 : 0);
  [ffHistory.clk, ffHistory.d, ffHistory.q].forEach(arr => { if (arr.length > 40) arr.shift(); });
  setTimeout(() => { ffClk = false; renderFlipFlop(); }, 220);
  renderFlipFlop();
}

function renderFlipFlop() {
  const dToggle = document.getElementById('ff-d-toggle');
  dToggle.className = 'toggle' + (ffD ? ' on' : '');
  const qLed = document.getElementById('ff-q-led');
  qLed.textContent = ffQ ? '1' : '0';
  qLed.className = 'led' + (ffQ ? ' on' : '');
  renderTrace('ff-trace-clk', ffHistory.clk, '#ffb020');
  renderTrace('ff-trace-d', ffHistory.d, '#5eff8f');
  renderTrace('ff-trace-q', ffHistory.q, '#5eff8f');
}

document.getElementById('ff-d-toggle').onclick = () => { ffD = !ffD; renderFlipFlop(); };
document.getElementById('ff-clock-btn').onclick = ffPulse;

// ---------- Tab switching ----------
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  };
});

// ---------- Init ----------
pushGateSample();
renderGate();
renderAdder();
renderFlipFlop();
</script>

</body>
</html>
